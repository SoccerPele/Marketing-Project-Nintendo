<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nintendo eShop's Game Finder</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .game-cover {
      overflow: hidden;
    }
    .game-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Nintendo Switch hero ───────────────────────────── */
    .switch-console {
      display: flex;
      align-items: stretch;
      max-width: 940px;
      margin: 40px auto 24px;
      padding: 0 16px;
      filter: drop-shadow(0 24px 48px rgba(0,0,0,0.35));
    }

    .joycon {
      flex: 0 0 clamp(46px, 9vw, 76px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: clamp(20px, 4vw, 40px) 0;
      position: relative;
    }
    .joycon-left {
      background: linear-gradient(135deg, #28c0f5, #1591d6);
      border-radius: 44px 8px 8px 44px;
      box-shadow: inset 0 0 22px rgba(0,0,0,0.18);
    }
    .joycon-right {
      background: linear-gradient(135deg, #ff4655, #e01b34);
      border-radius: 8px 44px 44px 8px;
      box-shadow: inset 0 0 22px rgba(0,0,0,0.18);
    }

    /* Joy-Con controls (CSS-drawn) */
    .stick {
      width: clamp(20px, 3.6vw, 30px);
      height: clamp(20px, 3.6vw, 30px);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 32%, #5a5a5a, #161616);
      border: 3px solid rgba(0,0,0,0.28);
    }
    .btn-cluster {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 3px;
      width: clamp(30px, 5.4vw, 46px);
      height: clamp(30px, 5.4vw, 46px);
    }
    .btn-cluster span {
      border-radius: 50%;
      background: rgba(0,0,0,0.22);
    }
    .dpad span:nth-child(2),
    .dpad span:nth-child(4),
    .dpad span:nth-child(6),
    .dpad span:nth-child(8) { background: rgba(0,0,0,0.32); }
    .dpad span:nth-child(1),
    .dpad span:nth-child(3),
    .dpad span:nth-child(5),
    .dpad span:nth-child(7),
    .dpad span:nth-child(9) { background: transparent; }
